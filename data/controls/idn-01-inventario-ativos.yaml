id: IDN-01
title: Inventário de ativos de informação e sistemas
description: >
  Manutenção de um inventário atualizado de ativos críticos (hardware,
  software, dados) relevantes para a segurança da rede e dos sistemas de
  informação.
qnrcs_function: Identificar
crosswalk:
  nis2_article: ["Art. 21(2)(a)"]
  regulamento_756_2026: ["Anexo III"]
  iso27001_annex_a: ["A.5.9"]
  cis_controls_v8: ["1.1", "2.1"]
levels:
  basico: true
  substancial: true
  elevado: true
evidence_type: documental
evidence_contract:
  source_hint: "CMDB / inventário de ativos (ex: GLPI, Snipe-IT)"
  fields: ["assets_total", "assets_classified", "inventory_ref", "last_update_at", "checked_at"]
